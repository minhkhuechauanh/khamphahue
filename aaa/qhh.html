<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khám phá Thành phố Huế</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script><script src="search.js"></script>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#eef3ff;
}
 .menu{
    list-style:none;
    display:flex;
    align-items:center;
    gap:30px;
    padding:15px 20px;
    margin:0;
}

 .search-box{
    position:relative;
}

#suggestions{
    position:absolute;
    top:100%;      
    left:0;
    margin-top:5px;  
    width:100%;
    background:white;
    border-radius:8px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    display:none;
    z-index:1000;
}
.search-item{
    margin-left:auto;
    display:flex;
    align-items:center;
}

 
.search-box input{
    width:160px;
    height:32px;
    padding:0 12px;
    border-radius:16px;
    border:2px solid #0a3d91;
    outline:none;
    font-size:14px;
}

 

.suggestion-item{
    padding:8px 10px;
    font-size:14px;
    cursor:pointer;
}

.suggestion-item:hover{
    background:#eef3ff;
}
header{
    height:220px;
    background-size:cover;
    background-position:center;
    animation: headerSlide 10s infinite;
}

@keyframes headerSlide{
    0%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue1.jpg");
    }
    50%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue2.jpg");
    }
    100%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("abs.jpg");
    }
}

.top_bar{
    max-width:1200px;
    height:220px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

.site_name{
    color:white;
    font-size:32px;
    font-weight:600;
}

.site_name a{
    color:white;
    text-decoration:none;
}

/* ===== MENU ===== */
.sidebar{
    width:100%;
    background:white;
    border-bottom:3px solid #0a3d91;
}

.sidebar ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:15px 0;
    margin:0;
}

.sidebar a{
    text-decoration:none;
    font-weight:600;
    color:#0a3d91;
    font-size:18px;
    padding:6px 12px;
    border-radius:4px;
    transition:0.2s;
}

.sidebar a:hover{
    background:#0a3d91;
    color:white;
}

/* ===== SECTION ===== */
.hue-section{
    max-width:1200px;
    margin:60px auto;
    padding:0 20px;
}

.section-title{
    text-align:center;
    font-size:36px;
    color:#0a3d91;
    margin-bottom:40px;
    font-weight:bold;
}


.book-wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

#book{
height:640px;
width:360px;
}

.page{
background:white;
display:flex;
justify-content:center;
align-items:center;
}
.page img{
width:100%;
height:100%;
object-fit:contain;
}
.book-controls{
margin-top:20px;
}

.book-controls button{
padding:10px 25px;
margin:0 10px;
border:none;
background:#0a3d91;
color:white;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

.book-controls button:hover{
background:#062c6f;
}
@media(max-width:1000px){
    .resource-grid{
        grid-template-columns: repeat(3, 1fr);
    }
}

@media(max-width:600px){
    .resource-grid{
        grid-template-columns: repeat(2, 1fr);
    }

    .site_name{
        font-size:20px;
    }
}
.tab-buttons{
    text-align:center;
    margin-bottom:30px;
}

.tab-buttons button{
    padding:10px 20px;
    margin:0 10px;
    border:none;
    background:#ccc;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
}

.tab-buttons button.active{
    background:#0a3d91;
    color:white;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.video-wrapper{
    display:flex;
    justify-content:center;
}
 
footer{
    background:#0b1c3d;
    color:#ddd;
    text-align:center;
    padding:20px 10px;
    margin-top:60px;
}

footer p{
    margin:6px 0;
}
</style>

</head>

<body>

<header>
<div class="top_bar">
<div class="site_name">
<a href="#">Khám phá Thành phố Huế</a>
</div>
</div>
</header>
<aside class="sidebar">
    <ul>
        <li><a href="position.html">Vị trí</a></li>
        <li><a href="introduction.html">Giới thiệu</a></li> <li><a href="code.html">Khám phá</a></li>
        
        <li><a href="tourism.html">Lịch sử</a></li>
<li><a href="resource.html">Tài nguyên</a></li>
        <li><div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm toàn website..." autocomplete="off">
    <div id="suggestions"></div>
</div></li>   </ul>
</aside>
<section class="hue-section">

<h2 class="section-title">Quốc Học Huế</h2>

<div class="tab-buttons">
    <button onclick="showTab('bookTab')" class="active">📖 Giới thiệu</button>
    <button onclick="showTab('videoTab')">🎬 Video</button>
</div>

 
<div id="bookTab" class="tab-content active">

<div class="book-wrapper">

<div id="book">
<div class="page"><img src="qhh/1.png"></div>
<div class="page"><img src="qhh/2.png"></div>
<div class="page"><img src="qhh/3.png"></div>
<!-- <div class="page"><img src="qhh/4.png"></div> -->
<!-- <div class="page"><img src="langkhaidinh/5.png"></div> -->
</div>

<div class="book-controls">
<button onclick="prevPage()">⬅ Trang trước</button>
<button onclick="nextPage()">Trang sau ➡</button>
</div>

</div>

</div>
 
<div id="videoTab" class="tab-content">

<div class="video-wrapper">
    <iframe 
        width="800" 
        height="450" 
        src="https://www.youtube.com/embed/hJMi2R2MKBs" 
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

</div>

</section>
<script>
function showTab(tabId){
    document.querySelectorAll(".tab-content").forEach(tab=>{
        tab.classList.remove("active")
    })

    document.querySelectorAll(".tab-buttons button").forEach(btn=>{
        btn.classList.remove("active")
    })

    document.getElementById(tabId).classList.add("active")

    event.target.classList.add("active")
}
</script>
<script>

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
width:350,
height:495,
size:"fixed",
showCover:true
}
)

pageFlip.loadFromHTML(document.querySelectorAll(".page"))

function nextPage(){
pageFlip.flipNext()
}

function prevPage(){
pageFlip.flipPrev()
}

</script><script src="search.js"></script>

</body>
</html>
