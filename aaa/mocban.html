<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khám phá Thành phố Huế</title>

<script src="search.js"></script>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#eef3ff;
}

 
.search-box{
    position:relative;
}

#suggestions{
    position:absolute;
    top:100%;
    left:0;
    margin-top:5px;
    width:100%;
    background:white;
    border-radius:8px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    display:none;
    z-index:1000;
}

.search-box input{
    width:160px;
    height:32px;
    padding:0 12px;
    border-radius:16px;
    border:2px solid #0a3d91;
    outline:none;
}
 
header{
    height:220px;
    background-size:cover;
    background-position:center;
    animation: headerSlide 10s infinite;
}

@keyframes headerSlide{
    0%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue1.jpg");
    }
    50%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue2.jpg");
    }
    100%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("abs.jpg");
    }
}

.top_bar{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.site_name{
    color:white;
    font-size:32px;
    font-weight:600;
}

/* MENU */
.sidebar{
    width:100%;
    background:white;
    border-bottom:3px solid #0a3d91;
}

.sidebar ul{
    list-style:none;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:15px 0;
    margin:0;
}

.sidebar a{
    text-decoration:none;
    font-weight:600;
    color:#0a3d91;
    font-size:18px;
}

/* SECTION */
.hue-section{
    max-width:1100px;
    margin:60px auto;
    padding:0 20px;
    text-align:center;
}

.section-title{
    font-size:36px;
    color:#0a3d91;
    margin-bottom:30px;
}

/* TAB */
.tab-buttons{
    margin-bottom:20px;
}

.tab-buttons button{
    padding:14px 40px;
    margin:0 12px;
    font-size:18px;
    font-weight:600;
    border:none;
    background:#0a3d91;
    color:white;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.tab-buttons button.active{
    background:#062c6f;
}

.tab-buttons button:hover{
    background:#062c6f;
    transform:scale(1.08);
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

/* SLIDE */
.viewer{
    width:800px;
    height:450px;
    overflow:hidden;
    margin:20px auto;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.slides{
    display:flex;
    transition:0.5s;
}

.slides img{
    width:800px;
    height:450px;
    object-fit:cover;
}

.book-controls{
    margin-top:15px;
}

.book-controls button{
    padding:10px 20px;
    margin:0 10px;
    border:none;
    background:#0a3d91;
    color:white;
    border-radius:20px;
    cursor:pointer;
}
 
.video-wrapper{
    width:800px;
    margin:20px auto;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

 
footer{
    background:#0b1c3d;
    color:#ddd;
    text-align:center;
    padding:20px;
    margin-top:60px;
}

/* MOBILE */
@media(max-width:900px){
    .viewer, .video-wrapper{
        width:95%;
    }

    .slides img{
        width:100%;
    }

    .video-wrapper iframe{
        height:220px;
    }
}

</style>
</head>

<body>

<header>
    <div class="top_bar">
        <div class="site_name">Khám phá Thành phố Huế</div>
    </div>
</header>

<aside class="sidebar">
    <ul>
        <li><a href="position.html">Vị trí</a></li>
        <li><a href="introduction.html">Giới thiệu</a></li>
        <li><a href="code.html">Khám phá</a></li>
        <li><a href="tourism.html">Lịch sử</a></li>
        <li><a href="resource.html">Tài nguyên</a></li>
        <li>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm toàn website..." autocomplete="off">
                <div id="suggestions"></div>
            </div>
        </li>
    </ul>
</aside>

<section class="hue-section">

<h2 class="section-title">Mộc bản Triều Nguyễn</h2>

<div class="tab-buttons">
    <button onclick="showTab('slideTab', this)" class="active">Giới thiệu</button>
    <button onclick="showTab('videoTab', this)">Video</button>
</div>

<!-- SLIDE -->
<div id="slideTab" class="tab-content active">
    <div class="viewer">
        <div class="slides" id="slide">
            <img src="mocban/e1b1f116-1.png">
            <img src="mocban/e1b1f116-2.png">
            <img src="mocban/e1b1f116-3.png">
            <img src="mocban/e1b1f116-4.png">
        </div>
    </div>

    <div class="book-controls">
        <button onclick="prev()">⬅</button>
        <button onclick="next()">➡</button>
    </div>
</div>

<!-- VIDEO -->
<div id="videoTab" class="tab-content">
    <div class="video-wrapper">
        <iframe 
            width="100%" 
            height="450"
            src="https://www.youtube.com/embed/WHRlpWrAcV4"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</div>

</section>

<footer>
    <p>© 2026 Khám phá Thành phố Huế</p>
</footer>

<script>


function showTab(tabId, btn){
    document.querySelectorAll(".tab-content").forEach(tab=>{
        tab.classList.remove("active")
    })

    document.querySelectorAll(".tab-buttons button").forEach(b=>{
        b.classList.remove("active")
    })

    document.getElementById(tabId).classList.add("active")
    btn.classList.add("active")
}


let index = 0;
const total = 3 + 1;
const slide = document.getElementById("slide");

function update(){
    slide.style.transform = "translateX(" + (-800 * index) + "px)";
}

function next(){
    if(index < total-1){
        index++;
        update();
    }
}

function prev(){
    if(index > 0){
        index--;
        update();
    }
}

</script>

<script src="search.js"></script>

</body>
</html>
```
